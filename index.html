// ── BOX CALCULATION CONSTANTS ─────────────────────────────────────────────────
const TIKKA_NAMES = new Set([
  "saza-e-kaalimirch","afghan-ka-shaitaan","lucknowi tamancha","tandoori blast",
  "dhaniya mirchi aur woh","gangs of awadh","pistol pesto","bloody peri",
  "achari atyaachari","achaari atyachaari","paapi pudina","shwarmaji ka beta",
  "shawarma ji ka beta","saza e kaalimirch"
]);
const GRAVY_NAMES = new Set([
  "kaalimirch ki haddcurry","palak ka panchnama","curry 9211","curry no. 9 2 11",
  "palak panchnama","kaalimirch haddcurry"
]);
const BOX_STORAGE_KEY = "kilrr_boxstock_v1";

const BOX_CITIES = [
  { key: "BLR", label: "ER Bengaluru", color: "#DC2626" },
  { key: "DEL", label: "ER Delhi",     color: "#059669" },
  { key: "KOL", label: "ER Kolkata",   color: "#2563EB" },
];

const DEFAULT_BOX_TYPES = [
  { id: "small",  label: "Small Box",  icon: "▪" },
  { id: "medium", label: "Medium Box", icon: "◾" },
  { id: "large",  label: "Large Box",  icon: "⬛" },
];

function buildDefaultState() {
  const state = { cities: {}, boxTypes: DEFAULT_BOX_TYPES };
  for (const city of BOX_CITIES) {
    state.cities[city.key] = {};
    for (const bt of DEFAULT_BOX_TYPES) {
      state.cities[city.key][bt.id]        = { qty: 0, reorderAt: 50,  pod: "", vendor: "", cost: 0 };
      state.cities[city.key][bt.id+"_pod"] = { qty: 0, reorderAt: 100, pod: bt.label.replace(/box/i,"").trim()+" POD", vendor: "", cost: 0 };
    }
  }
  return state;
}


function classifySkuType(nameRaw) {
  const low = (nameRaw || "").toLowerCase().trim();
  for (const g of GRAVY_NAMES) { if (low.includes(g.toLowerCase()) || g.toLowerCase().includes(low.split(" ")[0])) return "gravy"; }
  for (const t of TIKKA_NAMES) { if (low.includes(t.toLowerCase()) || t.toLowerCase().includes(low.split(" ")[0])) return "tikka"; }
  // SKU code pattern: ends in G6 = gravy, M6 = tikka/masala
  if (/G6$/i.test(low)) return "gravy";
  if (/M6$/i.test(low)) return "tikka";
  return "tikka"; // default
}

function classifyBox(tikkaQty, gravyQty) {
  const total = tikkaQty + gravyQty;
  // Special: 3+ gravy, no tikka → medium
  if (gravyQty >= 3 && tikkaQty === 0) return { box: "MEDIUM", pod: "Medium POD" };
  // Under 4 total → no box
  if (total < 4) return { box: "NO BOX", pod: "No POD" };
  // No gravy
  if (gravyQty === 0) {
    if (total <= 11) return { box: "SMALL",  pod: "Small POD"  };
    if (total <= 24) return { box: "MEDIUM", pod: "Medium POD" };
    return             { box: "LARGE",  pod: "Large POD"  };
  }
  // Has gravy
  if (total <= 24) return { box: "MEDIUM", pod: "Medium POD" };
  return               { box: "LARGE",  pod: "Large POD"  };
}

function parseERReportForBoxes(csvText) {
  // Parse CSV robustly
  const lines = csvText.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  if (lines.length < 2) return null;

  // Parse header
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  const findCol = (...names) => {
    for (const name of names) {
      const idx = headers.findIndex(h => h.toLowerCase().trim() === name.toLowerCase());
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const orderCol  = findCol("Sale Order Code", "Display Order Code");
  const skuCol    = findCol("SKU Name", "Item Type Name", "Item SKU Code");
  const statusCol = findCol("Sale Order Item Status");
  const facilityCol = findCol("Facility");

  if (orderCol < 0 || skuCol < 0) return null;

  // Parse rows — handle quoted fields
  const parseRow = (line) => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += line[i];
    }
    vals.push(cur.trim());
    return vals;
  };

  // Group by order
  const orders = {};
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseRow(lines[i]);
    const orderId = (vals[orderCol] || "").replace(/^`/, "").trim();
    if (!orderId) continue;
    const status = statusCol >= 0 ? (vals[statusCol] || "").toUpperCase() : "";
    // Skip cancelled
    if (status === "CANCELLED") continue;
    const skuName = (vals[skuCol] || "").trim();
    const facility = facilityCol >= 0 ? (vals[facilityCol] || "") : "";
    if (!orders[orderId]) orders[orderId] = { items: [], facility };
    orders[orderId].items.push(skuName);
  }

  // Classify each order and tally boxes
  const results = { SMALL: 0, MEDIUM: 0, LARGE: 0, NO_BOX: 0 };
  const podResults = { "Small POD": 0, "Medium POD": 0, "Large POD": 0, "No POD": 0 };
  const orderDetails = [];

  for (const [orderId, order] of Object.entries(orders)) {
    let tikka = 0, gravy = 0, unknown = 0;
    for (const name of order.items) {
      const type = classifySkuType(name);
      if (type === "gravy") gravy++;
      else if (type === "tikka") tikka++;
      else unknown++;
    }
    const { box, pod } = classifyBox(tikka, gravy);
    results[box === "NO BOX" ? "NO_BOX" : box]++;
    podResults[pod]++;
    orderDetails.push({ orderId, tikka, gravy, total: tikka + gravy, box, pod, facility: order.facility });
  }

  return { results, podResults, orderDetails, totalOrders: Object.keys(orders).length };
}

    const podMap = { "Small POD": "small_pod", "Medium POD": "medium_pod", "Large POD": "large_pod" };
    // Detect facility → city from order details
    const cityTally = { BLR:{SMALL:0,MEDIUM:0,LARGE:0}, KOL:{SMALL:0,MEDIUM:0,LARGE:0}, DEL:{SMALL:0,MEDIUM:0,LARGE:0} };

      const city = facToCity[od.facility] || facToCity[(od.facility||"").toLowerCase().replace(/_/g,"_")] || activeCity;

          const stateKey = boxMap[boxKey];

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const {useEffect, useCallback} = React;

  const loadShared = () => {
    try {
      if (window.location.hash && window.location.hash.length > 1) {
        const d = JSON.parse(atob(window.location.hash.slice(1)));
        if (d && (d.stock || d.rto)) return d;
      }
    } catch(e) {}
    try {
      const d = JSON.parse(localStorage.getItem("kilrr_shared_v1")||"null");
      if (d && (d.stock || d.rto)) return d;
    } catch(e) {}
    return {};
  };

  const [view, setView] = useState(null);
  const [rtoMonths, setRtoMonths] = useState(() => { const s=loadShared(); return s.rto||{}; });
  const [stockSnap, setStockSnap] = useState(() => { const s=loadShared(); return s.stock||null; });

  const rootLoadSettings = () => { try { return JSON.parse(localStorage.getItem("kilrr_settings")||"{}"); } catch(e) { return {}; } };
  const [rootSettings, setRootSettings] = useState(rootLoadSettings);
  const rootSaveSettings = (patch) => {
    const next = {...rootSettings,...patch};
    setRootSettings(next);
    try { localStorage.setItem("kilrr_settings", JSON.stringify(next)); } catch(e) {}
  };
  const [rootDriveUrl, setRootDriveUrl] = useState(() => {
    try { return localStorage.getItem("kilrr_drive_url")||rootLoadSettings().sheetUrl||""; } catch(e) { return ""; }
  });
  const rootSaveDriveUrl = url => {
    const clean = url.trim();
    setRootDriveUrl(clean);
    rootSaveSettings({sheetUrl:clean});
    try { localStorage.setItem("kilrr_drive_url", clean); } catch(e) {}
  };

  const pushHash = useCallback((stock, rto) => {
    try {
      const shared = {stock:stock||stockSnap, rto:rto||rtoMonths};
      const encoded = btoa(JSON.stringify(shared));
      const newHash = "#"+encoded;
      if (newHash !== window.location.hash) {
        window.history.replaceState(null,"",window.location.pathname+newHash);
        try { localStorage.setItem("kilrr_shared_v1", JSON.stringify(shared)); } catch(e) {}
      }
    } catch(e) {}
  }, [stockSnap, rtoMonths]);

  useEffect(()=>{ pushHash(stockSnap, rtoMonths); }, [rtoMonths]);
  useEffect(()=>{ pushHash(stockSnap, rtoMonths); }, [stockSnap]);

  const copySharedLink = useCallback(() => {
    try {
      pushHash(stockSnap, rtoMonths);
      const url = window.location.href;
      navigator.clipboard.writeText(url)
        .then(()=>alert("Link copied! Share this URL with your team."))
        .catch(()=>{ const ta=document.createElement("textarea"); ta.value=url; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); alert("Link copied!"); });
    } catch(e) {}
  }, [stockSnap, rtoMonths, pushHash]);

  if (!view) return React.createElement(LandingPage, {
    onSelect: setView, onCopyLink: copySharedLink,
    settings: rootSettings, saveSettings: rootSaveSettings,
    driveUrl: rootDriveUrl, saveDriveUrl: rootSaveDriveUrl,
  });
  if (view==="rto") return React.createElement(RTOApp, {
    onBack: ()=>setView(null), months: rtoMonths,
    setMonths: next=>{ setRtoMonths(next); rtoLsSave(next); },
  });
  if (view==="boxes") return React.createElement(BoxStockApp, {
    onBack: ()=>setView(null),
  });
  return React.createElement(StockApp, {
    onBack: ()=>setView(null), copySharedLink, onStateChange: setStockSnap, initialStock: stockSnap,
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
