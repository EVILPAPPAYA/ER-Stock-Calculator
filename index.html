const ceil50 = n => Math.ceil(n/50)*50;

function matchFlavour(val) {
  if(!val) return null;
  const low = String(val).toLowerCase().trim();
  const exact = FLAVOUR_MAP.find(f=>f.full.toLowerCase()===low||f.short.toLowerCase()===low);
  if(exact) return exact.short;
  let best=null, score=0;
  for(const f of FLAVOUR_MAP){
    const s=f.keywords.filter(k=>low.includes(k)).length;
    if(s>score){score=s;best=f.short;}
  }
  return score>0?best:null;
}

function parseDate(val) {
  if(!val) return null;
  // Already a JS Date object (XLSX parses date cells automatically)
  if(val instanceof Date) return isNaN(val.getTime()) ? null : val;
  const s=String(val).trim();
  // ISO: 2026-02-28 or 2026-02-28T13:36:42 or 2026-02-28 13:36:42
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return new Date(iso[1]+"-"+iso[2]+"-"+iso[3]);
  // dd/mm/yyyy or dd/mm/yyyy hh:mm:ss
  const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(dmy) return new Date(dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0"));
  // Try native parse as last resort
  const d=new Date(s);
  return isNaN(d.getTime()) ? null : d;
}


// ── CSV parser: reads text directly, preserves all values as plain strings ──
function parseCSVText(text) {
  // Normalise line endings
  var normalized = "";
  for (var i = 0; i < text.length; i++) {
    var code = text.charCodeAt(i);
    if (code === 13) { // \r
      normalized += "\n";
      if (i + 1 < text.length && text.charCodeAt(i + 1) === 10) i++; // skip \n after \r
    } else {
      normalized += text[i];
    }
  }
  // Parse into rows of cells
  var rows = [];
  var row = [];
  var cell = "";
  var inQuote = false;
  for (var j = 0; j < normalized.length; j++) {
    var ch = normalized[j];
    if (inQuote) {
      if (ch === '"' && normalized[j+1] === '"') { cell += '"'; j++; }
      else if (ch === '"') { inQuote = false; }
      else { cell += ch; }
    } else if (ch === '"') {
      inQuote = true;
    } else if (ch === ',') {
      row.push(cell); cell = "";
    } else if (ch === "\n") {
      row.push(cell); cell = "";
      rows.push(row); row = [];
    } else {
      cell += ch;
    }
  }
  // Handle last cell/row
  if (cell || row.length) { row.push(cell); rows.push(row); }
  if (rows.length === 0) return [];
  // First row = headers (strip BOM from first header)
  var headers = rows[0].map(function(h, i) {
    var s = h.trim();
    if (i === 0 && (s.charCodeAt(0) === 0xFEFF || s.charCodeAt(0) === 0x200B)) s = s.slice(1);
    return s;
  });
  // Rest = data rows
  var result = [];
  for (var k = 1; k < rows.length; k++) {
    var r = rows[k];
    if (!r.some(function(c) { return c.trim(); })) continue; // skip blank rows
    var obj = {};
    headers.forEach(function(h, idx) {
      obj[h] = r[idx] !== undefined ? r[idx] : "";
    });
    result.push(obj);
  }
  return result;
}

// ── File reader: CSV as text, Excel via XLSX ──
function parseFile(file) {
  return new Promise(function(res, rej) {
    var isCSV = file.name.toLowerCase().endsWith(".csv");
    var reader = new FileReader();
    if (isCSV) {
      reader.onload = function(ev) {
        try { res(parseCSVText(ev.target.result)); } catch(e) { rej(e); }
      };
      reader.onerror = rej;
      reader.readAsText(file, "utf-8");
    } else {
      reader.onload = function(ev) {
        try {
          var wb = XLSX.read(ev.target.result, {type:"array", cellDates:true});
          var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:"", raw:false});
          res(rows);
        } catch(e) { rej(e); }
      };
      reader.onerror = rej;
      reader.readAsArrayBuffer(file);
    }
  });
}


function NumInput({value, onChange}) {
  const [focus,setFocus]=useState(false);
  return <input type="number" min={0} value={value}
    onChange={e=>onChange(Math.max(0,parseInt(e.target.value)||0))}
    onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
    style={{width:"100%",padding:"7px 10px",borderRadius:5,
      border:`2px solid ${focus?K.red:K.bdr}`,
      background:focus?"#fff":K.s2,color:K.ink,
      fontFamily:"'IBM Plex Mono',monospace",fontSize:13,
      fontWeight:600,outline:"none",textAlign:"center",transition:"all .15s"}}/>;
}

function StatusChip({life}) {
  const cfg = life<0
    ? {label:"OVERSTOCK",bg:"rgba(91,33,182,0.08)", color:"#5B21B6", border:"rgba(91,33,182,0.2)"}
    : life<7
    ? {label:"CRITICAL",  bg:K.redDim2, color:K.red, border:"rgba(217,43,43,0.25)"}
    : {label:"OK",        bg:K.greenDim, color:K.green, border:"rgba(26,138,74,0.2)"};
  return <span style={{padding:"3px 10px",borderRadius:4,fontSize:9,fontWeight:700,
    letterSpacing:1.2,fontFamily:"'IBM Plex Mono',monospace",
    background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`}}>{cfg.label}</span>;
}

function Modal({children}) {
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",
    display:"flex",alignItems:"center",justifyContent:"center",
    zIndex:200,backdropFilter:"blur(4px)"}}>
    <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:12,
      padding:32,width:560,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",
      boxShadow:"0 24px 64px rgba(0,0,0,0.12)",animation:"slideUp .2s ease"}}>
      {children}
    </div>
  </div>;
}

function SectionHead({children, accent}) {
  return <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
    <div style={{width:3,height:20,background:accent||K.red,borderRadius:2}}/>
    <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,color:K.ink}}>{children}</span>
  </div>;
}

function ColumnMapper({title, headers, preview, fields, onConfirm, onClose}) {
  const [mapping,setMapping]=useState(()=>{
    const init={};
    fields.forEach(f=>{init[f.key]=headers.find(h=>f.detect.some(d=>h.toLowerCase().includes(d)))||"";});
    return init;
  });
  return <Modal>
    <SectionHead>{title}</SectionHead>
    {fields.map(f=>(
      <div key={f.key} style={{marginBottom:18}}>
        <div style={{fontSize:11,color:K.t2,letterSpacing:.5,marginBottom:6,fontWeight:600}}>{f.label}</div>
        <select value={mapping[f.key]} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value}))}
          style={{background:K.s2,color:mapping[f.key]?K.ink:K.t3,
            border:`2px solid ${mapping[f.key]?K.bdrD:K.bdr}`,
            borderRadius:6,padding:"9px 12px",fontSize:13,
            fontFamily:"'IBM Plex Sans',sans-serif",outline:"none",width:"100%",cursor:"pointer"}}>
          <option value="">— skip —</option>
          {headers.map(h=><option key={h} value={h}>{h}</option>)}
        </select>
      </div>
    ))}
    <div style={{background:K.s2,borderRadius:6,padding:16,marginBottom:24,
      border:`1px solid ${K.bdr}`,maxHeight:140,overflowY:"auto"}}>
      <div style={{fontSize:9,color:K.t3,letterSpacing:.8,marginBottom:8,
        fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>Preview</div>
      {preview.slice(0,5).map((row,i)=>{
        const v=row[mapping["sku"]||""]||"";
        const m=matchFlavour(v);
        return <div key={i} style={{display:"flex",gap:10,fontSize:11,marginBottom:5,alignItems:"center"}}>
          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,
            color:m?K.green:K.red,background:m?K.greenDim:K.redDim2,
            padding:"2px 7px",borderRadius:4,fontSize:10,minWidth:80}}>
            {m?`✓ ${m}`:"? unmatched"}
          </span>
          <span style={{color:K.t3,fontSize:10}}>{String(v).slice(0,35)}</span>
        </div>;
      })}
    </div>
    <div style={{display:"flex",gap:10}}>
      <button onClick={()=>onConfirm(mapping)} style={{flex:1,padding:12,borderRadius:6,
        border:"none",background:K.red,color:"#fff",fontWeight:700,fontSize:13,
        cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>Apply & Fill</button>
      <button onClick={onClose} style={{padding:"12px 20px",borderRadius:6,
        border:`2px solid ${K.bdr}`,background:"transparent",color:K.t2,
        fontSize:13,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:600}}>Cancel</button>
    </div>
  </Modal>;
}

function DemandPreview({byCityData, onConfirm, onClose}) {
  const cityKeys=Object.keys(byCityData);
  const [activeTab,setActiveTab]=React.useState(cityKeys[0]||"BLR");
  const item=byCityData[activeTab]||{results:{},dateRange:""};
  const cityColors={BLR:K.red,KOL:"#2563EB",DEL:"#059669"};
  // Detect if this city's report is a single-day deduction or a multi-day demand update
  const itemDays=Object.values(item.results||{}).length>0
    ? Object.values(item.results)[0].days : null;
  const isSingleDay=itemDays===1;
  return <Modal>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:2,marginBottom:4}}>
          {isSingleDay?"STOCK DEDUCTION PREVIEW":"DEMAND RATE PREVIEW"}
        </div>
        <div style={{fontSize:11,color:K.t3}}>Review before applying — {cityKeys.length} city/cities loaded</div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:K.t3}}>✕</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      {cityKeys.map(c=>{
        const cDays=Object.values(byCityData[c]?.results||{}).length>0
          ? Object.values(byCityData[c].results)[0].days : null;
        const cSingle=cDays===1;
        return <button key={c} onClick={()=>setActiveTab(c)} style={{
          padding:"7px 16px",borderRadius:6,
          border:`2px solid ${activeTab===c?(cityColors[c]||K.red):K.bdr}`,
          background:activeTab===c?`${(cityColors[c]||K.red)}12`:"transparent",
          color:activeTab===c?(cityColors[c]||K.red):K.t2,
          fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s"
        }}>
          {c}
          {cSingle&&<span style={{marginLeft:5,fontSize:9,background:"#F59E0B20",
            color:"#D97706",border:"1px solid #D97706",borderRadius:3,padding:"1px 4px"}}>DEDUCT</span>}
        </button>;
      })}
    </div>
    {/* Mode banner */}
    <div style={{padding:"10px 14px",borderRadius:8,marginBottom:12,
      background:isSingleDay?"#FEF3C7":"#EFF6FF",
      border:`1px solid ${isSingleDay?"#D97706":"#2563EB"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>
          <span style={{color:isSingleDay?"#D97706":"#2563EB",fontWeight:700}}>
            {isSingleDay?"Daily deduction mode":"Multi-day demand update"}
          </span>
          <span style={{color:K.t3,marginLeft:8}}>{item.dateRange}</span>
        </div>
        {item.files&&<span style={{fontSize:10,color:K.t3}}>{item.files.join(", ")}</span>}
      </div>
      <div style={{fontSize:10,color:isSingleDay?"#92400E":"#065F46",marginTop:4}}>
        {isSingleDay
          ?"1-day report: sold quantities deducted from base inventory. Demand rate unchanged."
          :"Multi-day report: daily demand rate recalculated. No stock deduction."}
      </div>
    </div>
    <div style={{overflowY:"auto",maxHeight:300,marginBottom:16}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead>
          <tr style={{borderBottom:`2px solid ${K.bdr}`}}>
            {["Flavour","Full Name","Sold",!isSingleDay?"Daily Rate (new)":"Stock Impact"].map(h=>(
              <th key={h} style={{padding:"8px 14px",textAlign:"left",color:K.t3,fontSize:10,
                letterSpacing:.6,fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {FLAVOUR_MAP.map((f,i)=>{
            const r=item.results[f.short];
            const cityBase=byCityData[activeTab]&&byCityData[activeTab]._baseInv;
            const base=cityBase?cityBase[f.short]:null;
            const after=(base!==null&&base!==undefined&&r)?Math.max(0,base-r.total):null;
            return <tr key={i} style={{borderBottom:`1px solid ${K.bdr}`,
              background:r&&r.total>0?"#FFFBF0":"transparent"}}>
              <td style={{padding:"8px 14px",fontFamily:"'Bebas Neue',cursive",
                fontSize:15,letterSpacing:1,color:cityColors[activeTab]||K.red}}>{f.short}</td>
              <td style={{padding:"8px 14px",fontSize:11,color:K.t2}}>{f.full}</td>
              <td style={{padding:"8px 14px",fontFamily:"'IBM Plex Mono',monospace",
                fontWeight:600,color:r?K.ink:K.t4}}>{r?r.total:"—"}</td>
              {!isSingleDay
                ? <td style={{padding:"8px 14px"}}>
                    {r
                      ?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:15,color:K.green}}>{r.daily}/day</span>
                      :<span style={{color:K.t4,fontSize:11}}>—</span>}
                  </td>
                : <td style={{padding:"8px 14px"}}>
                    {after!==null
                      ?<span style={{display:"inline-flex",alignItems:"center",gap:3,fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>
                        <span style={{color:K.t3}}>{base}</span>
                        <span style={{color:K.t3}}>{">"}</span>
                        <span style={{fontWeight:700,color:after<20?K.red:K.ink}}>{after}</span>
                        <span style={{color:K.red,fontSize:10}}>({"-"}{r?r.total:0})</span>
                      </span>
                      :<span style={{color:K.t4,fontSize:10}}>--</span>}
                  </td>}
            </tr>;
          })}
        </tbody>
      </table>
    </div>
    <div style={{display:"flex",gap:10}}>
      <button onClick={onConfirm} style={{flex:1,padding:12,borderRadius:6,border:"none",
        background:isSingleDay?"#D97706":K.green,color:"#fff",fontWeight:700,fontSize:13,
        cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
        {isSingleDay?"Deduct from Stock":"Update Demand Rate"}
      </button>
      <button onClick={onClose} style={{padding:"12px 20px",borderRadius:6,
        border:`2px solid ${K.bdr}`,background:"transparent",color:K.t2,
        fontSize:13,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:600}}>Cancel</button>
    </div>
  </Modal>;
}

function StockApp({onBack}) {
  // ── Persist / restore state ───────────────────────────────────────────────
  const loadSaved = () => {
    try {
      if (window.location.hash && window.location.hash.length > 1)
        { const d=JSON.parse(atob(window.location.hash.slice(1))); if(d&&d.rows) return d; }
    } catch(e) {}
    try {
      const d=JSON.parse(localStorage.getItem("kilrr_state")||"null");
      if(d&&d.rows) return d;
    } catch(e) {}
    return null;
  };

  const saved = loadSaved();
  const [activeMainTab, setActiveMainTab] = useState("status");
  const [city,setCity]           = useState(saved?.city||"BLR");
  const [targetDays,setTargetDays] = useState(saved?.targetDays||12);
  const [rows,setRows]           = useState(()=>saved?.rows||FLAVOUR_MAP.map(f=>({flavour:f.short,qty:0,demand:0,inTransit:0})));
  const [invByCity,setInvByCity] = useState(saved?.invByCity||{BLR:{},KOL:{},DEL:{}});
  const [baseInvByCity,setBaseInvByCity] = useState(saved?.baseInvByCity||{BLR:{},KOL:{},DEL:{}});
  const [soldByCity,setSoldByCity] = useState(saved?.soldByCity||{BLR:{},KOL:{},DEL:{}});
  const [demandByCity,setDemandByCity] = useState(saved?.demandByCity||{BLR:{},KOL:{},DEL:{}});
  const [inTransitByCity,setInTransitByCity] = useState(saved?.inTransitByCity||{BLR:{},KOL:{},DEL:{}});
  const [transitEtaByCity,setTransitEtaByCity] = useState(saved?.transitEtaByCity||{BLR:"",KOL:"",DEL:""});
  // dispatches: [{id,city,dispatchedAt,eta,status,items:{SKU:{qty,batchCode,mfgDate}}}]
  const [dispatches,setDispatches] = useState(saved?.dispatches||[]);
  const [invMapper,setInvMapper]   = useState(null);
  const [demandModal,setDemandModal] = useState(null);
  const [etaPromptList,setEtaPromptList] = useState(null); // dispatches needing ETA
  const [toast,setToast]           = useState(null);
  const [fillLog,setFillLog]       = useState(saved?.fillLog||{inv:[],demand:[]});
  // Dispatch form state
  const [dispForm,setDispForm] = useState({city:"BLR",items:Object.fromEntries(FLAVOUR_MAP.map(f=>[f.short,{qty:0,batchCode:"",mfgDate:""}]))});
  const invRef=useRef(), soRef=useRef();
  const cityConf=CITIES[city];

  // ── Auto-save ─────────────────────────────────────────────────────────────
  const { useEffect } = React;
  useEffect(()=>{
    try {
      const state={city,targetDays,rows,invByCity,baseInvByCity,soldByCity,demandByCity,inTransitByCity,transitEtaByCity,dispatches,fillLog};
      localStorage.setItem("kilrr_state",JSON.stringify(state));
    } catch(e) {}
  },[city,targetDays,rows,invByCity,demandByCity,inTransitByCity,transitEtaByCity,dispatches,fillLog]);

  // ── ETA prompt: on load, flag dispatches from before today without ETA ───
  useEffect(()=>{
    const today=new Date(); today.setHours(0,0,0,0);
    const needing=dispatches.filter(d=>{
      if(d.status==="delivered"||d.eta) return false;
      const dd=new Date(d.dispatchedAt); dd.setHours(0,0,0,0);
      return dd<today;
    });

  const postToSheet=async(action,payload)=>{

  // ── Helpers ───────────────────────────────────────────────────────────────
  const daysFromToday=(dateStr)=>{
    if(!dateStr) return null;
    const today=new Date(); today.setHours(0,0,0,0);

  const transitEta=transitEtaByCity[city]||"";

  const etaDaysLate=(!etaWithinWindow&&etaDays!==null)?etaDays-cityConf.transit:0;

  // ── Calc ──────────────────────────────────────────────────────────────────
  const calc=useMemo(()=>{
    // Sum dispatch quantities per SKU for current city
    const dispTotals={};
    dispatches.filter(d=>d.city===city&&d.status!=="delivered").forEach(d=>{
      Object.entries(d.items||{}).forEach(([sku,itemVal])=>{
        // itemVal is either {qty,batchCode,mfgDate} (new) or a plain number (legacy)
        const qty=typeof itemVal==="object"?(itemVal.qty||0):itemVal;
        const batchCode=typeof itemVal==="object"?itemVal.batchCode:"";
        if(!qty) return;
        if(!dispTotals[sku]) dispTotals[sku]={total:0,effective:0,batches:0,breakdown:[]};
        dispTotals[sku].total+=qty;
        dispTotals[sku].batches++;
        const ed=daysFromToday(d.eta);
        const eff=ed!==null&&ed<=cityConf.transit;
        if(eff) dispTotals[sku].effective+=qty;
        dispTotals[sku].breakdown.push({
          batchCode, qty, eta:d.eta,
          daysLeft:ed, effective:eff,
          dispatchedAt:d.dispatchedAt,
        });
      });
    });
    return rows.map(r=>{
      const sat=r.qty-r.demand*cityConf.transit;
      const lat=r.demand>0?sat/r.demand:0;
      const manualInT=r.inTransit||0;
      const manualEffective=etaWithinWindow?manualInT:0;
      const dt=dispTotals[r.flavour]||{total:0,effective:0,batches:0,breakdown:[]};
      const inT=manualInT+dt.total;
      const inTEffective=manualEffective+dt.effective;
      const need=targetDays*r.demand-sat-inTEffective;
      const send=r.demand===0?0:Math.max(0,ceil50(need));
      const sas=sat+send+inT;
      const las=r.demand>0?sas/r.demand:0;
      return{...r,sat,lat,send,sas,las,inT,inTEffective,
        dispTotal:dt.total,dispBatches:dt.batches,dispEffective:dt.effective,
        dispBreakdown:dt.breakdown};
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[rows,cityConf,targetDays,etaWithinWindow,dispatches,city]);

  const totalSend=calc.reduce((s,r)=>s+r.send,0);
  const critical=calc.filter(r=>r.demand>0&&r.lat<3).length;

  // ── Calc for ALL cities (used by Dispatch Breakup tab) ───────────────────
  const calcByCity=useMemo(()=>{
    const result={};
    Object.entries(CITIES).forEach(([c,cfg])=>{
      const cityEta=transitEtaByCity[c]||"";
      const cityEtaDays=daysFromToday(cityEta);
      const cityEtaWindow=cityEtaDays===null?true:cityEtaDays<=cfg.transit;
      const cityRows=FLAVOUR_MAP.map(f=>({
        flavour:f.short,
        qty:    invByCity[c][f.short]    ??0,
        demand: demandByCity[c][f.short] ??0,
        inTransit: inTransitByCity[c][f.short]?.qty ??0,
      }));
      // Dispatch totals for this city
      const dt={};
      dispatches.filter(d=>d.city===c&&d.status!=="delivered").forEach(d=>{
        Object.entries(d.items||{}).forEach(([sku,itemVal])=>{
          const qty=typeof itemVal==="object"?(itemVal.qty||0):itemVal;
          if(!qty) return;
          if(!dt[sku]) dt[sku]={total:0,effective:0};
          dt[sku].total+=qty;
          const ed=daysFromToday(d.eta);
          if(ed!==null&&ed<=cfg.transit) dt[sku].effective+=qty;
        });
      });
      result[c]=cityRows.map(r=>{
        const sat=r.qty-r.demand*cfg.transit;
        const manualEff=cityEtaWindow?r.inTransit:0;
        const d=dt[r.flavour]||{total:0,effective:0};
        const inTEff=manualEff+d.effective;
        const need=targetDays*r.demand-sat-inTEff;
        const send=r.demand===0?0:Math.max(0,ceil50(need));
        return{...r,sat,send,dispTotal:d.total};
      });
    });

  },[invByCity,demandByCity,inTransitByCity,transitEtaByCity,dispatches,targetDays]);

  const updateRow=(idx,field,val)=>{
    setRows(prev=>{
      const next=prev.map((r,i)=>i===idx?{...r,[field]:val}:r);
      if(field==="inTransit"){

      }

    });
  };
  const setTransitEta=(eta)=>setTransitEtaByCity(p=>({...p,[city]:eta}));

  const reset=()=>{

    setInvByCity({BLR:{},KOL:{},DEL:{}});
    setBaseInvByCity({BLR:{},KOL:{},DEL:{}});
    setSoldByCity({BLR:{},KOL:{},DEL:{}});
    setDemandByCity({BLR:{},KOL:{},DEL:{}});
    setInTransitByCity({BLR:{},KOL:{},DEL:{}});
    setTransitEtaByCity({BLR:"",KOL:"",DEL:""});
    setDispatches([]);
    setCity("BLR"); setTargetDays(12);
    try{localStorage.removeItem("kilrr_state");}catch(e){}
    window.history.replaceState(null,"",window.location.pathname);
    showToast("Data cleared",K.t2);

  const copyLink=()=>{

      const url=window.location.origin+window.location.pathname+"#"+btoa(JSON.stringify(state));
      navigator.clipboard.writeText(url).then(()=>showToast("🔗 Link copied!",K.green))
        .catch(()=>{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);showToast("🔗 Link copied!",K.green);});
    }catch(e){showToast("Could not copy link",K.red);}

  // ── Drive fetch ───────────────────────────────────────────────────────────
  const [driveLoading,setDriveLoading]=useState(false);
  const [driveUrl,setDriveUrl]=useState(()=>{try{return localStorage.getItem("kilrr_drive_url")||"";}catch(e){return "";}});
  const [showUrlInput,setShowUrlInput]=useState(false);
  const saveDriveUrl=(url)=>{setDriveUrl(url);try{localStorage.setItem("kilrr_drive_url",url);}catch(e){}};

  const fetchFromDrive=async()=>{
    if(!driveUrl){setShowUrlInput(true);return;}
    setDriveLoading(true);
    try{
      showToast("Fetching from Drive...","#7C3AED");
      const url=driveUrl+(driveUrl.includes("?")?"&":"?")+"t="+Date.now();
      const res=await fetch(url);
      if(!res.ok) throw new Error("Apps Script returned "+res.status);
      const json=await res.json();
      if(!json.success) throw new Error(json.error||"Apps Script error");
      if(json.warnings&&json.warnings.length) json.warnings.forEach(w=>console.warn("Drive sync:",w));
      // Drive sync: treat fetched inventory as the new base and compute sold deduction
      const fetchedInv=json.inventory||{BLR:{},KOL:{},DEL:{}};
      const fetchedDemand=json.demand||{};

      // Build demand map (daily values)
      const newDBC={BLR:{},KOL:{},DEL:{}};
      for(const[c,flavs] of Object.entries(fetchedDemand))
        for(const[s,d] of Object.entries(flavs)) newDBC[c][s]=typeof d==="object"?d.daily:d;

      // If we already have a base inventory, apply sold deduction on top of fetched data
      // Otherwise treat fetched inventory as the new base
      const hasBase=Object.values(baseInvByCity).some(c=>Object.keys(c).length>0);
      if(!hasBase){
        // First time: set base = fetched inventory, sold = 0
        setBaseInvByCity(fetchedInv);
        setSoldByCity({BLR:{},KOL:{},DEL:{}});
        setInvByCity(fetchedInv);
      } else {
        // Accumulate sold from demand data (use total sold if available, else estimate from dailyxdays)
        const newSold={BLR:{...soldByCity.BLR},KOL:{...soldByCity.KOL},DEL:{...soldByCity.DEL}};
        for(const[c,flavs] of Object.entries(fetchedDemand)){
          if(!newSold[c]) newSold[c]={};
          for(const[s,d] of Object.entries(flavs)){
            const total=typeof d==="object"?d.total:null;
            if(total) newSold[c][s]=(newSold[c][s]||0)+total;
          }
        }
        setSoldByCity(newSold);
        const newInv={BLR:{},KOL:{},DEL:{}};
        for(const c of ["BLR","KOL","DEL"]){
          const base=baseInvByCity[c]||{};
          const sold=newSold[c]||{};
          newInv[c]={};
          for(const[short,baseQty] of Object.entries(base)){
            newInv[c][short]=Math.max(0,baseQty-(sold[short]||0));
          }
        }
        setInvByCity(newInv);
      }

      setDemandByCity(newDBC);
      const currInv=(hasBase?invByCity:fetchedInv)[city]||{};
      const currDemand=newDBC[city]||{};
      setRows(prev=>prev.map(r=>({...r,qty:currInv[r.flavour]??0,demand:currDemand[r.flavour]??0})));
      setFillLog({inv:Object.keys(currInv),demand:Object.keys(currDemand)});
      showToast(`✓ Synced from Drive — ${(json.filesProcessed||[]).length} files`,K.green);
    }catch(err){showToast("Error: "+err.message,K.red);}
    finally{setDriveLoading(false);}
  };

  const exportCSV=()=>{
    const hdr=["Flavour","Full Name","Qty","Daily Demand","In Transit","ETA",`After ${cityConf.transit}D Transit`,"Life After Transit","To Send","After Send","Est Life After Send"];
    const body=calc.map(r=>{const fm=FLAVOUR_MAP.find(f=>f.short===r.flavour);return[r.flavour,fm?.full,r.qty,r.demand,r.inTransit||0,transitEtaByCity[city]||"",r.demand>0?r.sat.toFixed(0):"",r.demand>0?r.lat.toFixed(1)+"d":"",r.demand>0?r.send:"",r.demand>0?r.sas.toFixed(0):"",r.demand>0?r.las.toFixed(1)+"d":""];});
    const csv=[hdr,...body].map(r=>r.join(",")).join("\n");

    a.download=`kilrr-stock-${city}-${new Date().toISOString().slice(0,10)}.csv`;a.click();
    showToast("CSV exported",K.green);
  };

  const lifeSc=d=>d<0?"#5B21B6":d<7?K.red:K.green;

  // ── Inventory/SaleOrder upload handlers (unchanged logic) ─────────────────

  const handleInv=useCallback(async e=>{
    const file=e.target.files?.[0]; if(!file) return;
    try{
      const data=await parseFile(file);
      if(!data.length) return showToast("File is empty",K.red);

      // Strip BOM and normalise header names
      const rawHeaders=Object.keys(data[0]);
      const cleanHeader=h=>h.replace(/^[\uFEFF\u200B]/,"").trim();
      const headers=rawHeaders.map(cleanHeader);

      // Remap row keys to clean headers
      const cleanRows=data.map(row=>{
        const out={};
        rawHeaders.forEach((rh,i)=>{out[headers[i]]=row[rh];});
        return out;
      });

      // Find columns flexibly
      const facCol  = headers.find(h=>/^facility$/i.test(h));
      const nameCol = headers.find(h=>/item.?type.?name/i.test(h));
      const qtyCol  = headers.find(h=>/^quantity$/i.test(h));

      if(facCol && nameCol && qtyCol){
        // Auto-detect city from ER_ rows
        const FMAP={"er_bangalore":"BLR","er_banglore":"BLR","erbanglore":"BLR","erbangalore":"BLR",
                    "er_kolkata":"KOL","erkolkata":"KOL",
                    "er_delhi":"DEL","erdelhi":"DEL"};
        let detectedCity=null;
        for(const row of cleanRows){
          const fac=(row[facCol]||"").toLowerCase().replace(/[^a-z]/g,"");
          if(FMAP[fac]){detectedCity=FMAP[fac];break;}
        }
        const targetCity=detectedCity||city;
        // Match facility by stripping non-alpha and comparing
        const cityFacBase={BLR:"erbangalore",KOL:"erkolkata",DEL:"erdelhi"}[targetCity];
        const updates={},log=[];
        for(const row of cleanRows){
          const fac=(row[facCol]||"").toLowerCase().replace(/[^a-z]/g,"");
          if(fac!==cityFacBase) continue;
          const short=matchFlavour(row[nameCol]);
          if(!short) continue;
          updates[short]=(updates[short]||0)+(parseInt(row[qtyCol])||0);
          if(!log.includes(short)) log.push(short);
        }
        // Build per-city inventory from ALL ER rows in the file
        const allCityInv={BLR:{},KOL:{},DEL:{}};
        // Only process ER_ facilities — ignore KILRR, KILRR_BATCHING etc.
        const cityFacMap={BLR:"erbangalore",KOL:"erkolkata",DEL:"erdelhi"};
        for(const row of cleanRows){
          const facRaw=(row[facCol]||"").trim();
          if(!facRaw.toLowerCase().startsWith("er")) continue; // skip non-ER rows
          const fac=facRaw.toLowerCase().replace(/[^a-z]/g,"");
          const matchedCity=Object.keys(cityFacMap).find(c=>cityFacMap[c]===fac);
          if(!matchedCity) continue;
          const short=matchFlavour(row[nameCol]);
          if(!short) continue;
          allCityInv[matchedCity][short]=(allCityInv[matchedCity][short]||0)+(parseInt(row[qtyCol])||0);
        }
        const filledCities=Object.keys(allCityInv).filter(c=>Object.keys(allCityInv[c]).length>0);
        if(!filledCities.length) return showToast("No ER rows found in file",K.red);
        // Save all cities — also store as base (used for deducting daily sales)
        setInvByCity(allCityInv);
        setBaseInvByCity(allCityInv);
        setSoldByCity({BLR:{},KOL:{},DEL:{}}); // reset sold totals when new inventory uploaded
        // Determine which city to show — prefer detected, else keep current
        const activeCity=detectedCity||city;
        if(detectedCity && detectedCity!==city) setCity(detectedCity);
        const activeInv=allCityInv[activeCity];
        const activeLog=Object.keys(activeInv);
        setRows(prev=>prev.map(r=>({...r, qty: activeInv[r.flavour]??0})));
        setFillLog(p=>({...p,inv:activeLog}));
        const cityLabels=filledCities.map(c=>CITIES[c].label).join(", ");
        showToast(`✓ Loaded inventory for: ${cityLabels}`,K.red);
        return;
      }
      // Unknown format — show mapper
      setInvMapper({headers,preview:cleanRows});
    }
    catch(err){
      console.error("Inventory parse error:",err);

    }

  },[city]);

  const applyInv=useCallback(mapping=>{
    const data=invMapper.preview,updates={},log=[];

    setRows(prev=>prev.map(r=>updates[r.flavour]!==undefined?{...r,qty:updates[r.flavour]}:r));
    setFillLog(p=>({...p,inv:log}));setInvMapper(null);showToast(`Qty filled for ${log.length} flavours`,K.red);
  },[invMapper]);

  // Process a single file: returns {city, results:{flavour:{total,days,daily}}, dateRange, fileName} or null
  const processSingleSO=async (file)=>{
    const data=await parseFile(file);
    if(!data.length) return null;
    const rawHeaders=Object.keys(data[0]);
    const norm=h=>h.replace(/^\uFEFF/,"").trim();
    const headers=rawHeaders.map(norm);
    const cleanRows=data.map(row=>{
      const out={};rawHeaders.forEach((rh,i)=>{out[headers[i]]=row[rh];});return out;
    });
    const skuCol    = headers.find(h=>h==="SKU Name")||headers.find(h=>/item.?type.?name/i.test(h))||headers.find(h=>/sku.?name/i.test(h));
    const dateCol   = headers.find(h=>h==="Invoice Created")||headers.find(h=>/invoice.?creat/i.test(h));
    const facCol    = headers.find(h=>/^facility$/i.test(h));
    const statusCol = headers.find(h=>/sale.?order.?item.?status/i.test(h));
    if(!skuCol||!dateCol) return null;
    // Only ER_ facilities — ER_Bangalore→BLR, ER_Kolkata→KOL, ER_Delhi→DEL
    const FMAP={"erbangalore":"BLR","erbanglore":"BLR","erkolkata":"KOL","erdelhi":"DEL"};
    let detectedCity=null;
    if(facCol){for(const row of cleanRows){const fac=String(row[facCol]||"").toLowerCase().replace(/[^a-z]/g,"");if(FMAP[fac]){detectedCity=FMAP[fac];break;}}}
    const targetCity=detectedCity||city;
    const cityFacBase={BLR:"erbangalore",KOL:"erkolkata",DEL:"erdelhi"}[targetCity];
    const counts={};const allDates=new Set();
    for(const row of cleanRows){
      if(statusCol&&String(row[statusCol]||"").toUpperCase()==="CANCELLED") continue;
      if(facCol){const fac=String(row[facCol]||"").toLowerCase().replace(/[^a-z]/g,"");if(fac!==cityFacBase) continue;}
      const short=matchFlavour(row[skuCol]);if(!short) continue;
      counts[short]=(counts[short]||0)+1;
      const s=String(row[dateCol]||"").trim();
      const isoM=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      const dmyM=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      let dk=null;
      if(isoM) dk=isoM[1]+"-"+isoM[2]+"-"+isoM[3];
      else if(dmyM) dk=dmyM[3]+"-"+dmyM[2].padStart(2,"0")+"-"+dmyM[1].padStart(2,"0");
      if(dk) allDates.add(dk);
    }
    if(!Object.keys(counts).length||!allDates.size) return null;
    const sorted=[...allDates].sort();
    const msPerDay=1000*60*60*24;
    const numDays=Math.round((new Date(sorted[sorted.length-1])-new Date(sorted[0]))/msPerDay)+1;
    const results={};
    for(const[short,total] of Object.entries(counts)) results[short]={total,days:numDays,daily:Math.ceil(total/numDays)};
    return{city:targetCity,results,dateRange:`${sorted[0]} -> ${sorted[sorted.length-1]} (${numDays} days)`,fileName:file.name};
  };

  const handleSO=useCallback(async e=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length) return;
    try{
      const parsed=await Promise.all(files.map(processSingleSO));
      const valid=parsed.filter(Boolean);
      if(!valid.length) return showToast("No usable order data found",K.red);
      // Merge by city (multiple files for same city get summed)
      const byCity={};
      for(const item of valid){
        const c=item.city;
        if(!byCity[c]){byCity[c]={city:c,dateRange:item.dateRange,results:{},files:[]};}
        byCity[c].files.push(item.fileName);
        // Merge results
        for(const[short,r] of Object.entries(item.results)){
          if(!byCity[c].results[short]) byCity[c].results[short]={total:0,days:r.days,daily:0};
          byCity[c].results[short].total+=r.total;
          byCity[c].results[short].days=r.days;
          byCity[c].results[short].daily=Math.ceil(byCity[c].results[short].total/r.days);
        }
      }
      // Attach base inventory to each city data for preview display
      for(const c of Object.keys(byCity)){
        byCity[c]._baseInv=invByCity[c]||{};
      }
      setDemandModal({byCityData:byCity});
    }catch(err){
      console.error("SO parse error:",err);
      showToast("Error: "+err.message,K.red);
    }
    e.target.value="";
  },[city]);

  const applyDemand=useCallback(()=>{
    const{byCityData}=demandModal;
    // Keep existing demand unless multi-day report overrides it
    const newDBC={BLR:{...demandByCity.BLR},KOL:{...demandByCity.KOL},DEL:{...demandByCity.DEL}};
    const citiesLoaded=[];
    const deductOnlyCities=[], demandUpdateCities=[];

    // Accumulate sold totals from this report into soldByCity
    const newSold={BLR:{...soldByCity.BLR},KOL:{...soldByCity.KOL},DEL:{...soldByCity.DEL}};
    for(const[c,item] of Object.entries(byCityData)){
      if(!newSold[c]) newSold[c]={};
      // Determine mode for this city: single-day = deduct only; multi-day = update demand too
      const sampleDays=Object.values(item.results||{}).length>0
        ? Object.values(item.results)[0].days : null;
      const isSingleDay=sampleDays===1;

      for(const[short,r] of Object.entries(item.results)){
        if(isSingleDay){
          // 1-day: deduct from stock only, demand rate unchanged
          newSold[c][short]=(newSold[c][short]||0)+r.total;
        } else {
          // Multi-day: update demand rate only, no stock deduction
          newDBC[c][short]=r.daily;
        }
      }
      citiesLoaded.push(c);
      if(isSingleDay) deductOnlyCities.push(c);
      else demandUpdateCities.push(c);
    }

    // Recompute current stock = base inventory - total sold (floor 0)
    const newInv={BLR:{},KOL:{},DEL:{}};
    for(const c of ["BLR","KOL","DEL"]){
      const base=baseInvByCity[c]||{};
      const sold=newSold[c]||{};
      newInv[c]={};
      for(const[short,baseQty] of Object.entries(base)){
        newInv[c][short]=Math.max(0,baseQty-(sold[short]||0));
      }
    }

    setSoldByCity(newSold);
    setInvByCity(newInv);
    setDemandByCity(newDBC);

    // Apply current city to rows
    const currInv=newInv[city]||{};
    const currDemand=newDBC[city]||{};
    setRows(prev=>prev.map(r=>({
      ...r,
      qty:    currInv[r.flavour]    ?? r.qty,
      demand: currDemand[r.flavour] ?? r.demand,
    })));
    setFillLog(p=>({...p,demand:Object.keys(currDemand)}));
    setDemandModal(null);
    const parts=[];
    if(deductOnlyCities.length) parts.push("Stock deducted: "+deductOnlyCities.join(", "));
    if(demandUpdateCities.length) parts.push("Demand updated: "+demandUpdateCities.join(", "));
    showToast("✓ "+parts.join(" · "),K.green);
  },[demandModal,city,soldByCity,baseInvByCity,demandByCity]);

  // ── JSX ───────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:K.bg,color:K.ink}}>

      {/* ── ETA PROMPT MODAL ── */}

                    background:d.newEta?"#7C3AED0A":K.s2,color:d.newEta?"#7C3AED":K.t3,
                    fontFamily:"'IBM Plex Mono',monospace",fontSize:12,outline:"none"}}/>
              </div>
            </div>;

          <div style={{display:"flex",gap:10,marginTop:4}}>

              background:"#D97706",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",
              fontFamily:"'IBM Plex Sans',sans-serif"}}>Save ETAs</button>
            <button onClick={()=>setEtaPromptList(null)} style={{padding:"12px 20px",borderRadius:6,
              border:`2px solid ${K.bdr}`,background:"transparent",color:K.t2,
              fontSize:13,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:600}}>Remind Later</button>
          </div>
        </div>
      </div>}

      {/* ── DRIVE URL INPUT MODAL ── */}
      {showUrlInput&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",

        <div style={{display:"flex",gap:0,marginTop:10,borderTop:`1px solid ${K.bdr}`}}>
          {[

                </span>}
            </button>
          ))}
        </div>
      </div>

      {/* ════════════════ STOCK STATUS TAB ════════════════ */}
      {activeMainTab==="status"&&<div style={{padding:"24px 32px",maxWidth:1500,margin:"0 auto"}}>

        {/* STEP CARDS */}
        {(!fillLog.inv.length||!fillLog.demand.length)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:22}}>
            {[
              {n:"01",label:"Upload Inventory Report",sub:"☁ Use Fetch from Drive above, or upload CSV below",done:fillLog.inv.length>0,color:K.red,count:fillLog.inv.length,fn:()=>invRef.current.click()},
              {n:"02",label:"Upload Sale Orders",sub:"☁ Use Fetch from Drive above, or upload CSVs below",done:fillLog.demand.length>0,color:K.green,count:fillLog.demand.length,fn:()=>soRef.current.click()},
            ].map(s=>(
              <div key={s.n} onClick={s.done?undefined:s.fn}
                style={{background:K.s1,borderRadius:10,padding:"18px 22px",cursor:s.done?"default":"pointer",
                  border:`2px solid ${s.done?s.color:K.bdr}`,display:"flex",alignItems:"center",gap:18,
                  transition:"all .2s",boxShadow:s.done?`0 0 0 4px ${s.color}08`:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <div style={{width:44,height:44,borderRadius:8,flexShrink:0,
                  background:s.done?`${s.color}10`:K.s2,border:`2px solid ${s.done?s.color:K.bdr}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'Bebas Neue',cursive",fontSize:20,color:s.done?s.color:K.t3}}>
                  {s.done?"✓":s.n}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:s.done?s.color:K.ink}}>{s.label}</div>
                  <div style={{fontSize:11,color:K.t3,marginTop:3}}>{s.done?`${s.count} flavours loaded`:s.sub}</div>
                </div>
                {!s.done&&<span style={{color:K.bdr,fontSize:18}}>-></span>}
              </div>
            ))}
          </div>
        )}

        {/* CONTROLS */}
        <div style={{display:"grid",gridTemplateColumns:"auto auto auto 1fr",gap:14,marginBottom:22,alignItems:"stretch"}}>
          <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:10,padding:"16px 20px"}}>

              fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>City</div>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(CITIES).map(([key,cfg])=>(
                <button key={key} onClick={()=>switchCity(key)} style={{padding:"9px 18px",borderRadius:6,cursor:"pointer",
                  border:`2px solid ${city===key?K.red:K.bdr}`,background:city===key?K.redDim2:"transparent",
                  color:city===key?K.red:K.t2,fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:700,
                  letterSpacing:.5,transition:"all .15s"}}>
                  {key}<div style={{fontSize:9,opacity:.7,marginTop:2,fontWeight:400}}>{cfg.transit}D</div>
                </button>

          <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:10,padding:"16px 20px",minWidth:220}}>
            <div style={{fontSize:10,color:K.t3,letterSpacing:.8,marginBottom:12,
              fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>Target Days</div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <input type="range" min={7} max={21} step={1} value={targetDays}
                onChange={e=>setTargetDays(+e.target.value)} style={{flex:1}}/>
              <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:34,color:K.red,minWidth:50,lineHeight:1}}>
                {targetDays}<span style={{fontSize:16,color:K.t3}}>d</span>

          <div style={{background:K.s1,border:`2px solid #7C3AED`,borderRadius:10,padding:"16px 20px",minWidth:190}}>
            <div style={{fontSize:10,color:K.t3,letterSpacing:.8,marginBottom:12,
              fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>Manual Transit ETA</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="date" value={transitEtaByCity[city]||""} onChange={e=>setTransitEta(e.target.value)}
                style={{flex:1,padding:"7px 10px",borderRadius:6,
                  border:`2px solid ${transitEtaByCity[city]?"#7C3AED":"#D1C9C0"}`,
                  background:transitEtaByCity[city]?"#7C3AED0A":K.s2,

              {transitEtaByCity[city]&&<button onClick={()=>setTransitEta("")}

            {transitEtaByCity[city]&&<div style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",marginTop:5,

              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:42,color:K.ink,lineHeight:1}}>

                  const rowBg=urg?"#FFF0F0":idx%2===0?K.s1:"#FAFAF8";
                  return <tr key={idx}
                    style={{borderBottom:`1px solid ${K.bdr}`,background:rowBg,transition:"background .1s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=K.s3}
                    onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                    <td style={{padding:"8px 0 8px 14px",width:16}}>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        {invF&&<div style={{width:5,height:5,borderRadius:"50%",background:K.red}}/>}
                        {dmdF&&<div style={{width:5,height:5,borderRadius:"50%",background:K.green}}/>}
                      </div>
                    </td>
                    <td style={{padding:"8px 14px"}}>
                      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,letterSpacing:1,
                        color:urg?K.red:K.ink}}>{row.flavour}</span>
                    </td>
                    <td style={{padding:"8px 14px"}}>
                      <span style={{fontSize:11,color:K.t2}}>{fm?.full}</span>
                    </td>
                    <td style={{padding:"6px 10px",minWidth:100}}>
                      <NumInput value={row.qty} onChange={v=>updateRow(idx,"qty",v)}/>
                    </td>
                    <td style={{padding:"6px 10px",minWidth:100}}>
                      <NumInput value={row.demand} onChange={v=>updateRow(idx,"demand",v)}/>
                    </td>
                    <td style={{padding:"6px 8px",minWidth:160}}>
                      <NumInput value={row.inTransit||0} onChange={v=>updateRow(idx,"inTransit",v)}/>
                      {(row.dispBreakdown||[]).map((b,bi)=>{
                        const bColor=b.effective?"#059669":b.eta?"#D97706":"#7C3AED";
                        const bBg=b.effective?"#D1FAE5":b.eta?"#FEF3C7":"#EDE9FE";
                        return <div key={bi} style={{
                          display:"flex",alignItems:"center",justifyContent:"space-between",
                          marginTop:bi===0?5:3,padding:"3px 7px",borderRadius:4,
                          background:bBg,border:`1px solid ${bColor}20`}}>
                          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,
                            fontWeight:700,color:bColor,letterSpacing:.3}}>{b.batchCode}</span>
                          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,
                            fontWeight:700,color:bColor,marginLeft:6}}>{b.qty}</span>
                          {b.eta
                            ?<span style={{fontSize:8,color:bColor,marginLeft:4,fontFamily:"'IBM Plex Mono',monospace"}}>
                              {b.effective?`✓ in ${b.daysLeft}d`:`⚠ ${b.daysLeft}d`}
                            </span>
                            :<span style={{fontSize:8,color:"#7C3AED",marginLeft:4}}>no ETA</span>}
                        </div>;
                      })}
                      {(row.dispBreakdown||[]).length>0&&<div style={{
                        marginTop:4,fontSize:8,color:K.t3,fontFamily:"'IBM Plex Mono',monospace",
                        display:"flex",justifyContent:"space-between"}}>
                        <span>total: <b style={{color:"#7C3AED"}}>{row.dispTotal}</b></span>
                        {row.dispEffective>0&&<span style={{color:"#059669"}}>effective: <b>{row.dispEffective}</b></span>}
                      </div>}
                    </td>
                    <td style={{padding:"10px 14px"}}>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:13,
                        color:row.demand>0?(row.sat<0?K.red:K.ink):K.t4}}>
                        {row.demand>0?row.sat.toFixed(0):"—"}
                      </span>
                    </td>
                    <td style={{padding:"10px 14px"}}>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:13,
                        color:row.demand>0?lifeSc(row.lat):K.t4}}>
                        {row.demand>0?`${row.lat.toFixed(1)}d`:"—"}
                      </span>
                    </td>
                    <td style={{padding:"10px 14px"}}>
                      {row.demand>0?row.send>0
                        ?<span style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:K.amber,letterSpacing:.5}}>{row.send.toLocaleString()}</span>
                        :<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,color:K.t3,fontWeight:600}}>0</span>
                        :<span style={{color:K.t4}}>—</span>}
                    </td>
                    <td style={{padding:"10px 14px"}}>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,fontSize:13,color:row.demand>0?K.t2:K.t4}}>
                        {row.demand>0?row.sas.toFixed(0):"—"}
                      </span>
                    </td>
                    <td style={{padding:"10px 14px"}}>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:13,
                        color:row.demand>0?lifeSc(row.las):K.t4}}>
                        {row.demand>0?`${row.las.toFixed(1)}d`:"—"}
                      </span>
                    </td>
                    <td style={{padding:"8px 14px"}}>
                      {row.demand>0?<StatusChip life={row.las}/>:<span style={{color:K.t4,fontSize:10}}>—</span>}
                    </td>
                  </tr>;
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:`2px solid ${K.bdrD}`,background:K.s2}}>
                  <td colSpan={8} style={{padding:"13px 14px",fontSize:11,color:K.t2,
                    letterSpacing:.6,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,textTransform:"uppercase"}}>
                    Total Dispatch
                  </td>
                  <td style={{padding:"13px 14px"}}>
                    <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:K.amber}}>
                      {totalSend.toLocaleString()} pkts
                    </span>
                  </td>
                  <td colSpan={3}/>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        {/* Formula bar */}
        <div style={{marginTop:14,padding:"12px 22px",background:K.s1,
          border:`2px solid ${K.bdr}`,borderRadius:8,display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:9,color:K.t3,letterSpacing:.8,fontFamily:"'IBM Plex Mono',monospace",
            textTransform:"uppercase",fontWeight:700}}>Formulas</span>
          {[
            `After transit = Qty - (Demand x ${cityConf.transit})`,
            `To Send = ceil(max(0, ${targetDays}xD - Stock) / 50) x 50`,
            `Daily Demand = Total sold / Invoice days`,
          ].map((f,i)=>(
            <span key={i} style={{fontSize:11,color:K.t2,fontFamily:"'IBM Plex Mono',monospace"}}>{f}</span>
          ))}
        </div>
      </div>}

      {/* ════════════════ STOCK DISPATCHED TAB ════════════════ */}
      {activeMainTab==="dispatched"&&<div style={{padding:"24px 32px",maxWidth:1500,margin:"0 auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:20,alignItems:"start"}}>

          {/* ── NEW DISPATCH FORM ── */}
          <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:10,overflow:"hidden",
            boxShadow:"0 2px 12px rgba(0,0,0,0.04)",position:"sticky",top:80}}>
            <div style={{background:`linear-gradient(135deg,${K.red},#FF4020)`,padding:"14px 20px"}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,color:"#fff"}}>LOG NEW DISPATCH</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:2}}>Record stock sent to ER facilities</div>
            </div>
            <div style={{padding:20}}>
              {/* City */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:K.t3,letterSpacing:.8,marginBottom:8,
                  fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>Dispatch To</div>
                <div style={{display:"flex",gap:8}}>
                  {Object.entries(CITIES).map(([key,cfg])=>(
                    <button key={key} onClick={()=>setDispForm(p=>({...p,city:key}))} style={{
                      flex:1,padding:"9px 0",borderRadius:6,cursor:"pointer",
                      border:`2px solid ${dispForm.city===key?K.red:K.bdr}`,
                      background:dispForm.city===key?K.redDim2:"transparent",
                      color:dispForm.city===key?K.red:K.t2,
                      fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:.5}}>
                      {key}<div style={{fontSize:9,opacity:.7,fontWeight:400}}>{cfg.transit}D</div>
                    </button>
                  ))}
                </div>
              </div>
              {/* Batch code and Mfg date are entered per flavour below */}
              <div style={{padding:"8px 12px",background:"#F5F3FF",borderRadius:6,marginBottom:12,
                fontSize:10,color:"#7C3AED",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>
                Enter qty to reveal batch code + mfg date fields per flavour
              </div>
              {/* SKU quantities */}
              <div style={{fontSize:10,color:K.t3,letterSpacing:.8,marginBottom:8,
                fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>Quantities Dispatched</div>
              <div style={{maxHeight:420,overflowY:"auto",marginBottom:14,borderRadius:6,
                border:`1px solid ${K.bdr}`}}>
                {FLAVOUR_MAP.map((f,i)=>{
                  const item=dispForm.items[f.short]||{qty:0,batchCode:"",mfgDate:""};
                  const active=(item.qty||0)>0;
                  return <div key={f.short} style={{
                    borderBottom:i<FLAVOUR_MAP.length-1?`1px solid ${K.bdr}`:"none",
                    background:active?"#FFF8F8":"transparent",
                    transition:"background .1s"}}>
                    {/* Row 1: SKU name + qty */}
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px 4px"}}>
                      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:14,letterSpacing:.5,
                        color:active?K.red:K.t2,minWidth:72}}>{f.short}</span>
                      <span style={{fontSize:10,color:K.t3,flex:1,overflow:"hidden",
                        textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.full}</span>
                      <input type="number" min={0} value={item.qty||""}
                        placeholder="0"
                        onChange={e=>{const q=parseInt(e.target.value)||0;
                          setDispForm(p=>({...p,items:{...p.items,[f.short]:{...p.items[f.short],qty:q}}}));}}
                        style={{width:70,padding:"5px 8px",borderRadius:5,textAlign:"center",
                          border:`2px solid ${active?K.red:K.bdr}`,
                          background:active?"#FFF0F0":K.s2,
                          color:K.ink,fontFamily:"'IBM Plex Mono',monospace",fontSize:13,
                          fontWeight:700,outline:"none"}}/>
                    </div>
                    {/* Row 2: Batch code + Mfg date — only when qty > 0 */}
                    {active&&<div style={{display:"flex",gap:6,padding:"0 12px 8px",paddingLeft:82}}>
                      <input placeholder="Batch code *"
                        value={item.batchCode||""}
                        onChange={e=>setDispForm(p=>({...p,items:{...p.items,[f.short]:{...p.items[f.short],batchCode:e.target.value}}}))}
                        style={{flex:1,padding:"5px 8px",borderRadius:5,
                          border:`2px solid ${item.batchCode?"#7C3AED":"#FCA5A5"}`,
                          background:item.batchCode?"#F5F3FF":"#FFF5F5",
                          color:K.ink,fontFamily:"'IBM Plex Mono',monospace",fontSize:11,
                          fontWeight:600,outline:"none"}}/>
                      <input type="date" value={item.mfgDate||""}
                        onChange={e=>setDispForm(p=>({...p,items:{...p.items,[f.short]:{...p.items[f.short],mfgDate:e.target.value}}}))}
                        style={{width:130,padding:"5px 8px",borderRadius:5,
                          border:`1px solid ${K.bdr}`,background:K.s2,
                          color:item.mfgDate?K.ink:K.t3,
                          fontFamily:"'IBM Plex Mono',monospace",fontSize:11,outline:"none"}}/>
                    </div>}
                  </div>;
                })}
              </div>
              {/* Total */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,
                padding:"10px 14px",background:K.s2,borderRadius:6}}>
                <span style={{fontSize:11,color:K.t2,fontFamily:"'IBM Plex Mono',monospace"}}>Total packets</span>
                <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,color:K.red}}>
                  {Object.values(dispForm.items).reduce((s,v)=>s+((typeof v==="object"?v.qty:v)||0),0).toLocaleString()}
                </span>
              </div>
              <button onClick={addDispatch} style={{width:"100%",padding:"13px 0",borderRadius:8,border:"none",
                background:`linear-gradient(135deg,${K.red},#FF4020)`,color:"#fff",
                fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,cursor:"pointer",
                boxShadow:`0 4px 14px ${K.red}40`,transition:"all .2s"}}>
                DISPATCH ->
              </button>
            </div>
          </div>

          {/* ── DISPATCH HISTORY ── */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,color:K.ink}}>DISPATCH HISTORY</div>
              <div style={{display:"flex",gap:12,fontSize:11,color:K.t3,fontFamily:"'IBM Plex Mono',monospace"}}>
                <span>🚚 {dispatches.filter(d=>d.status==="in_transit").length} in transit</span>
                <span>✓ {dispatches.filter(d=>d.status==="delivered").length} delivered</span>
              </div>
            </div>

            {dispatches.length===0&&<div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:10,
              padding:"40px 24px",textAlign:"center",color:K.t3}}>
              <div style={{fontSize:32,marginBottom:8}}>📦</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>No dispatches logged yet</div>
              <div style={{fontSize:11,marginTop:4}}>Use the form to log your first dispatch</div>
            </div>}

            {dispatches.map((d,idx)=>{
              const itemsList=Object.entries(d.items||{}).filter(([,v])=>(typeof v==="object"?(v.qty||0):v)>0);
              const total=itemsList.reduce((s,[,v])=>s+(typeof v==="object"?(v.qty||0):v),0);
              const ed=daysFromToday(d.eta);
              const cityTransit=CITIES[d.city]?.transit||7;
              const withinWindow=d.eta?(ed!==null&&ed<=cityTransit):null;
              const isDelivered=d.status==="delivered";
              const needsEta=!isDelivered&&!d.eta;
              const isLate=d.eta&&!isDelivered&&ed!==null&&ed<0;

              return <div key={d.id} style={{background:K.s1,border:`2px solid ${
                isDelivered?K.bdr:isLate?"#D97706":needsEta?"#7C3AED40":K.bdr}`,
                borderLeft:`4px solid ${isDelivered?K.t4:isLate?"#D97706":d.eta&&withinWindow?"#059669":"#7C3AED"}`,
                borderRadius:10,padding:"16px 20px",marginBottom:12,
                opacity:isDelivered?0.6:1,
                boxShadow:isDelivered?"none":"0 2px 8px rgba(0,0,0,0.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,letterSpacing:1,
                        color:isDelivered?K.t3:K.red,lineHeight:1}}>{d.city}</div>
                      <div style={{fontSize:9,color:K.t3}}>{CITIES[d.city]?.transit}D transit</div>
                    </div>
                    <div style={{width:1,height:30,background:K.bdr}}/>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:K.ink}}>{d.batchCode}</div>
                      <div style={{fontSize:10,color:K.t3}}>
                        Dispatched {d.dispatchedAt}
                        {d.mfgDate&&<span style={{marginLeft:8}}>· Mfg {d.mfgDate}</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:isDelivered?K.t3:K.amber}}>
                      {total.toLocaleString()} pkts
                    </span>
                    <span style={{padding:"3px 8px",borderRadius:4,fontSize:9,fontWeight:700,letterSpacing:.8,
                      fontFamily:"'IBM Plex Mono',monospace",
                      background:isDelivered?"#F0F0F0":isLate?"#FEF3C7":withinWindow===true?"#D1FAE5":withinWindow===false?"#FEF3C7":"#EDE9FE",
                      color:isDelivered?K.t3:isLate?"#D97706":withinWindow===true?"#059669":withinWindow===false?"#D97706":"#7C3AED"}}>
                      {isDelivered?"DELIVERED":isLate?"OVERDUE":withinWindow===true?"✓ ON TIME":withinWindow===false?"⚠ LATE":"AWAITING ETA"}
                    </span>
                  </div>
                </div>

                {/* Items — per flavour batch detail */}
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                  {itemsList.map(([s,itemVal])=>{
                    const qty=typeof itemVal==="object"?(itemVal.qty||0):itemVal;
                    const bc=typeof itemVal==="object"?itemVal.batchCode:"";
                    const mfg=typeof itemVal==="object"?itemVal.mfgDate:"";
                    return <div key={s} style={{display:"flex",alignItems:"center",gap:8,
                      padding:"5px 10px",borderRadius:5,background:K.s2,
                      border:`1px solid ${K.bdr}`}}>
                      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:14,letterSpacing:.5,
                        color:K.red,minWidth:72}}>{s}</span>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,
                        fontSize:14,color:K.ink,minWidth:36}}>{qty}</span>
                      <span style={{flex:1,fontFamily:"'IBM Plex Mono',monospace",fontSize:11,
                        fontWeight:700,color:"#7C3AED"}}>{bc}</span>
                      {mfg&&<span style={{fontSize:10,color:K.t3,fontFamily:"'IBM Plex Mono',monospace"}}>Mfg: {mfg}</span>}
                    </div>;
                  })}
                </div>

                {/* ETA row */}
                {!isDelivered&&<div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:10,color:K.t3,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap"}}>
                    ETA to {d.city}:
                  </span>
                  <input type="date" value={d.eta||""}
                    onChange={e=>updateDispatchEta(d.id,e.target.value)}
                    style={{padding:"5px 9px",borderRadius:6,
                      border:`2px solid ${d.eta?"#7C3AED":"#D1C9C0"}`,
                      background:d.eta?"#7C3AED0A":K.s2,
                      color:d.eta?"#7C3AED":K.t3,
                      fontFamily:"'IBM Plex Mono',monospace",fontSize:11,outline:"none"}}/>
                  {d.eta&&<span style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,
                    color:withinWindow?"#059669":isLate?"#DC2626":"#D97706"}}>
                    {isLate?`${Math.abs(ed)}d overdue`:withinWindow?`✓ within ${cityTransit}D window`:`⚠ ${ed-cityTransit}d beyond window`}
                  </span>}
                  <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                    <button onClick={()=>markDelivered(d.id)} style={{padding:"5px 12px",borderRadius:5,
                      border:`1px solid ${K.green}`,background:K.greenDim,color:K.green,
                      fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,cursor:"pointer"}}>
                      ✓ Mark Delivered
                    </button>
                    <button onClick={()=>deleteDispatch(d.id)} style={{padding:"5px 10px",borderRadius:5,
                      border:`1px solid ${K.bdr}`,background:"transparent",color:K.t3,
                      fontSize:10,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer"}}>✕</button>
                  </div>
                </div>}
                {isDelivered&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,color:K.t3,fontFamily:"'IBM Plex Mono',monospace"}}>
                    {d.eta?`Arrived ${d.eta}`:"ETA not recorded"}
                  </span>
                  <button onClick={()=>deleteDispatch(d.id)} style={{padding:"4px 10px",borderRadius:5,
                    border:`1px solid ${K.bdr}`,background:"transparent",color:K.t3,
                    fontSize:10,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer"}}>Remove</button>
                </div>}
              </div>;
            })}
          </div>
        </div>
      </div>}

      {/* ════════════════ DISPATCH BREAKUP TAB ════════════════ */}
      {activeMainTab==="breakup"&&<div style={{padding:"24px 32px",maxWidth:1500,margin:"0 auto"}}>

        {/* Summary KPI row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
          {Object.entries(CITIES).map(([c,cfg])=>{
            const cityCalc=calcByCity[c]||[];
            const toSend=cityCalc.reduce((s,r)=>s+r.send,0);
            const skuCount=cityCalc.filter(r=>r.send>0).length;
            const cColor={BLR:K.red,KOL:"#2563EB",DEL:"#059669"}[c];
            return <div key={c} style={{background:K.s1,border:`2px solid ${K.bdr}`,
              borderLeft:`5px solid ${cColor}`,borderRadius:10,padding:"18px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:10,color:K.t3,letterSpacing:.8,marginBottom:4,
                    fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",fontWeight:600}}>
                    {cfg.label}
                  </div>
                  <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:42,color:K.ink,lineHeight:1}}>
                    {toSend.toLocaleString()}
                    <span style={{fontSize:15,color:K.t3,marginLeft:8,fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:400}}>pkts</span>
                  </div>
                  <div style={{fontSize:11,color:K.t3,marginTop:4}}>{skuCount} SKUs to dispatch · {cfg.transit}D transit</div>
                </div>
                <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:cColor,opacity:.3}}>{c}</div>
              </div>
            </div>;
          })}
        </div>

        {/* Grand total bar */}
        <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderLeft:`5px solid ${K.amber}`,
          borderRadius:10,padding:"14px 24px",marginBottom:22,
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:11,color:K.t2,fontFamily:"'IBM Plex Mono',monospace",
            letterSpacing:.6,textTransform:"uppercase",fontWeight:600}}>Grand Total Dispatch</div>
          <div style={{display:"flex",gap:32,alignItems:"baseline"}}>
            {Object.entries(CITIES).map(([c])=>{
              const t=(calcByCity[c]||[]).reduce((s,r)=>s+r.send,0);
              const cColor={BLR:K.red,KOL:"#2563EB",DEL:"#059669"}[c];
              return <span key={c} style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:700,color:cColor}}>
                {c}: {t.toLocaleString()}
              </span>;
            })}
            <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:30,color:K.amber}}>
              {Object.values(calcByCity).reduce((s,rows)=>s+rows.reduce((a,r)=>a+r.send,0),0).toLocaleString()} total
            </span>
          </div>
        </div>

        {/* Per-flavour breakup table */}
        <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:10,overflow:"hidden"}}>

/* ═══════════════════════════════════════════════════════════════
   RTO DASHBOARD — same light theme as Stock

const RTO_ST   = new Set(["RTO_IN_TRANSIT","RTO_DELIVERED_TO_SELLER","RETURNED_TO_ORIGIN","RTO_INITIATED"]);
const SHIP_ST  = new Set(["DISPATCHED","DELIVERED","SHIPPED","RETURN_EXPECTED","RETURNED"]);
const ER_RAW   = new Set(["ER_Delhi","ER_Bangalore","ER_Kolkata"]);
const ER_LBL   = {"ER_Delhi":"Delhi","ER_Bangalore":"Bangalore","ER_Kolkata":"Kolkata"};
const MN_R     = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FULL_MN_R= ["January","February","March","April","May","June","July","August","September","October","November","December"];
const ER_COL_R = {Delhi:K.red, Bangalore:"#2563EB", Kolkata:"#059669"};
const RTO_STORAGE_KEY = "kilrr_rto_v1";

function rtoLsLoad(){try{const v=localStorage.getItem(RTO_STORAGE_KEY);return v?JSON.parse(v):{};}catch(e){return{};}}
function rtoLsSave(d){try{localStorage.setItem(RTO_STORAGE_KEY,JSON.stringify(d));}catch(e){}}
const rtoPct=(a,b)=>b?Math.round(a/b*1000)/10:0;

function detectMonthR(rows){
  const counts={};
  for(const r of rows){
    const raw=r["Order Date as dd/mm/yyyy hh:MM:ss"]||r["Dispatch Date"]||"";
    const parts=raw.split("/");
    if(parts.length<3) continue;
    const mo=parseInt(parts[0],10),yr=parseInt(parts[2],10);
    if(isNaN(mo)||isNaN(yr)) continue;
    const k=yr+"-"+String(mo).padStart(2,"0");
    counts[k]=(counts[k]||0)+1;
  }
  const s=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  return s.length?s[0][0]:null;
}

function aggregateRTO(rows){
  const shipped=rows.filter(r=>SHIP_ST.has(r["Shipping Package Status Code"]));
  if(!shipped.length) return null;
  const mk=detectMonthR(rows);
  if(!mk) return null;
  const [yr,mo]=mk.split("-");
  const monthLabel=FULL_MN_R[parseInt(mo,10)-1]+" "+yr;
  const monthShort=MN_R[parseInt(mo,10)-1]+" "+yr;
  const isRTO=r=>RTO_ST.has(r["Shipping Tracking Status"]);
  const isCOD=r=>r["COD"]==1||r["COD"]==="1"||r["COD"]===true;
  const ER_FAC_ORDER=["ER_Bangalore","ER_Delhi","ER_Kolkata"];
  const erRows=shipped
    .filter(r=>r["Channel Name"]==="SHOPIFY"&&ER_RAW.has(r["Facility"]))
    .sort((a,b)=>ER_FAC_ORDER.indexOf(a["Facility"])-ER_FAC_ORDER.indexOf(b["Facility"]));
  if(!erRows.length) return null;
  const total=shipped.length;
  const centreMap={};
  for(const r of erRows){
    const name=ER_LBL[r["Facility"]]||r["Facility"];
    if(!centreMap[name]) centreMap[name]={orders:0,rto:0,cod:0,codRTO:0,pre:0,preRTO:0};
    const c=centreMap[name]; c.orders++;
    if(isRTO(r)) c.rto++;
    if(isCOD(r)){c.cod++;if(isRTO(r))c.codRTO++;}
    else{c.pre++;if(isRTO(r))c.preRTO++;}
  }
  const ER_ORDER_R=["Bangalore","Delhi","Kolkata"];
  const centres=Object.entries(centreMap).map(([name,c])=>({
    name,orders:c.orders,
    pct_of_er:rtoPct(c.orders,erRows.length),
    pct_of_all:rtoPct(c.orders,total),
    rto:c.rto,rto_pct:rtoPct(c.rto,c.orders),
    cod:{orders:c.cod,pct:rtoPct(c.cod,c.orders),rto:c.codRTO,rto_pct:rtoPct(c.codRTO,c.cod)},
    prepaid:{orders:c.pre,pct:rtoPct(c.pre,c.orders),rto:c.preRTO,rto_pct:rtoPct(c.preRTO,c.pre)},
  })).sort((a,b)=>{
    const ai=ER_ORDER_R.indexOf(a.name),bi=ER_ORDER_R.indexOf(b.name);
    return(ai===-1?99:ai)-(bi===-1?99:bi);
  });
  const erTotal=erRows.length,erRTO=erRows.filter(isRTO).length;
  const erCOD=erRows.filter(isCOD),erPre=erRows.filter(r=>!isCOD(r));
  const erCODRTO=erCOD.filter(isRTO).length,erPreRTO=erPre.filter(isRTO).length;
  return{
    monthKey:mk,monthLabel,monthShort,totalShipped:total,
    er:{
      total:erTotal,pct_of_all:rtoPct(erTotal,total),
      rto:erRTO,rto_pct:rtoPct(erRTO,erTotal),
      cod:{orders:erCOD.length,pct:rtoPct(erCOD.length,erTotal),rto:erCODRTO,rto_pct:rtoPct(erCODRTO,erCOD.length)},
      prepaid:{orders:erPre.length,pct:rtoPct(erPre.length,erTotal),rto:erPreRTO,rto_pct:rtoPct(erPreRTO,erPre.length)},
      centres,
    },
  };
}
