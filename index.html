function RTOUploadPanel({onData,processing,setProcessing}){
  const ref=React.useRef();
  const [drag,setDrag]=useState(false);
  const [err,setErr]=useState("");
  const handle=(file)=>{
    if(!file) return;
    setErr(""); setProcessing(true);
    Papa.parse(file,{
      header:true,skipEmptyLines:true,
      complete:(res)=>{
        try{
          const agg=aggregateRTO(res.data);
          if(!agg){setErr("No ER Shopify orders found. Check the file.");setProcessing(false);return;}
          onData(agg);
        }catch(e){setErr("Parse error: "+e.message);setProcessing(false);}
      },
      error:(e)=>{setErr("CSV error: "+e.message);setProcessing(false);}
    });
  };
  return <div
    onDragOver={e=>{e.preventDefault();setDrag(true);}}
    onDragLeave={()=>setDrag(false)}
    onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
    onClick={()=>ref.current&&ref.current.click()}
    style={{border:`2px dashed ${drag?K.red:K.bdr}`,borderRadius:10,padding:"28px 24px",
      textAlign:"center",cursor:"pointer",transition:"all .15s",
      background:drag?K.redDim:K.s2}}>
    <input ref={ref} type="file" accept=".csv" style={{display:"none"}}
      onChange={e=>handle(e.target.files[0])}/>
    {processing
      ?<div>
        <div style={{fontSize:24,marginBottom:8}}>⚙️</div>
        <p style={{fontSize:13,color:K.t2,fontFamily:"'IBM Plex Mono',monospace"}}>Processing…</p>
      </div>
      :<div>
        <div style={{fontSize:28,marginBottom:8}}>📂</div>
        <p style={{fontSize:14,fontWeight:700,color:K.ink,marginBottom:4}}>Drop Unicommerce Sale Orders CSV</p>
        <p style={{fontSize:12,color:K.t3}}>Month auto-detected · Only ER Shopify rows are used</p>
        {err&&<p style={{fontSize:12,color:K.red,marginTop:10,fontFamily:"'IBM Plex Mono',monospace"}}>{err}</p>}
      </div>}
  </div>;
}

function RTOApp({onBack}){
  const [months,setMonths]=useState(()=>rtoLsLoad());
  const [activeMonth,setActiveMonth]=useState(()=>{
    const keys=Object.keys(rtoLsLoad()).sort();
    return keys.length?keys[keys.length-1]:null;
  });
  const [activeTab,setActiveTab]=useState("month");
  const [processing,setProcessing]=useState(false);
  const [showUpload,setShowUpload]=useState(false);
  const [delConfirm,setDelConfirm]=useState(null);
  const [toast,setToast]=useState(null);
  const {useEffect}=React;

  const showRToast=useCallback((msg,color)=>{
    setToast({msg,color:color||K.green});
    setTimeout(()=>setToast(null),3000);
  },[]);

  const handleData=useCallback((agg)=>{
    setMonths(prev=>{const next={...prev,[agg.monthKey]:agg};rtoLsSave(next);return next;});
    setActiveMonth(agg.monthKey);
    setShowUpload(false);setProcessing(false);
    showRToast("✓ "+agg.monthLabel+" saved — "+agg.er.total.toLocaleString()+" ER orders");
  },[showRToast]);

  const handleDelete=useCallback((mk)=>{
    setMonths(prev=>{
      const next={...prev};delete next[mk];rtoLsSave(next);
      const rem=Object.keys(next).sort();
      setActiveMonth(rem.length?rem[rem.length-1]:null);
      return next;
    });
    setDelConfirm(null);showRToast("Month deleted",K.t2);
  },[showRToast]);

  const sorted=Object.keys(months).sort();
  const cur=activeMonth?months[activeMonth]:null;

  return <div style={{minHeight:"100vh",background:K.bg,color:K.ink,fontFamily:"'IBM Plex Sans',sans-serif"}}>
    {toast&&<div style={{position:"fixed",top:20,right:24,zIndex:300,padding:"11px 20px",
      borderRadius:8,background:K.s1,color:toast.color,fontWeight:700,fontSize:12,
      letterSpacing:.4,border:`2px solid ${toast.color}`,
      boxShadow:"0 8px 32px rgba(0,0,0,0.1)",fontFamily:"'IBM Plex Mono',monospace"}}>{toast.msg}</div>}

    {delConfirm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(4px)"}}>
      <div style={{background:K.s1,border:`2px solid ${K.bdr}`,borderRadius:12,padding:32,
        width:360,textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,0.12)"}}>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:2,marginBottom:8}}>
          DELETE {months[delConfirm]&&months[delConfirm].monthLabel}?
        </div>
        <p style={{fontSize:13,color:K.t2,marginBottom:20}}>This removes it from local storage.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>setDelConfirm(null)} style={{cursor:"pointer",background:"transparent",
            border:`2px solid ${K.bdr}`,borderRadius:8,padding:"9px 20px",color:K.t2,
            fontSize:12,fontWeight:600,fontFamily:"'IBM Plex Sans',sans-serif"}}>Cancel</button>
          <button onClick={()=>handleDelete(delConfirm)} style={{cursor:"pointer",background:K.red,
            border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",
            fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Sans',sans-serif"}}>Delete</button>
        </div>
      </div>
    </div>}

    {/* HEADER */}
    <div style={{background:K.s1,borderBottom:`2px solid ${K.bdr}`,padding:"0 32px",
      position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
      <div style={{height:3,background:`linear-gradient(90deg,${K.red},#FF6B35)`,margin:"0 -32px"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <button onClick={onBack} style={{cursor:"pointer",background:"transparent",
            border:`1px solid ${K.bdr}`,borderRadius:7,padding:"6px 12px",
            color:K.t3,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:.3}}>
            ← Back
          </button>
          <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:5,color:K.red}}>KILRR</span>
          <div style={{width:1,height:26,background:K.bdr}}/>
          <div>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:17,letterSpacing:2.5,color:K.ink}}>
              RTO ANALYTICS
            </div>
            <div style={{fontSize:10,color:K.t3,marginTop:1,fontFamily:"'IBM Plex Mono',monospace"}}>
              ER Centres · Delhi · Bangalore · Kolkata
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {sorted.length>=2&&<div style={{display:"flex",gap:0,background:K.s2,padding:3,borderRadius:8}}>
            {[["month","📅 Month"],["trend","📈 Trend"]].map(([id,label])=>(
              <button key={id} onClick={()=>setActiveTab(id)} style={{cursor:"pointer",border:"none",
                borderRadius:6,padding:"7px 14px",fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",
                background:activeTab===id?K.red:"transparent",
                color:activeTab===id?"#fff":K.t2,transition:"all .15s"}}>{label}</button>
            ))}
          </div>}
          <button onClick={()=>setShowUpload(v=>!v)} style={{cursor:"pointer",background:K.red,
            border:"none",borderRadius:8,padding:"8px 16px",color:"#fff",fontSize:11,
            fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:.3}}>
            ⬆ Upload Month
          </button>
        </div>
      </div>
      {showUpload&&<div style={{padding:"12px 0"}}>
        <RTOUploadPanel onData={handleData} processing={processing} setProcessing={setProcessing}/>
      </div>}
      {/* Month tabs */}
      {sorted.length>0&&<div style={{display:"flex",gap:0,borderTop:`1px solid ${K.bdr}`,marginTop:10}}>
        {sorted.map(mk=>{
          const dd=months[mk],active=activeMonth===mk;
          return <div key={mk} style={{display:"flex",alignItems:"flex-end"}}>
            <button onClick={()=>setActiveMonth(mk)} style={{cursor:"pointer",background:"transparent",
              border:"none",borderBottom:`3px solid ${active?K.red:"transparent"}`,
              padding:"10px 20px",fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",
              color:active?K.red:K.t3,transition:"all .13s",marginBottom:-2}}>
              <span style={{display:"block"}}>{dd.monthLabel}</span>
              <span style={{display:"block",fontSize:9,color:K.t3,marginTop:1}}>
                {dd.er.total.toLocaleString()} ER orders
              </span>
            </button>
            {active&&<button onClick={e=>{e.stopPropagation();setDelConfirm(mk);}}
              style={{cursor:"pointer",background:K.redDim,border:`1px solid ${K.red}40`,
                borderRadius:6,padding:"3px 8px",color:K.red,fontSize:11,fontWeight:600,
                fontFamily:"'IBM Plex Mono',monospace",marginBottom:8,marginLeft:2}}>✕</button>}
          </div>;
        })}
      </div>}
    </div>

    {/* CONTENT */}
    <div style={{padding:"24px 32px 48px",maxWidth:1500,margin:"0 auto"}}>
      {sorted.length===0&&<div style={{textAlign:"center",padding:"80px 0"}}>
        <div style={{fontSize:48,marginBottom:16}}>📦</div>
        <p style={{fontSize:18,fontWeight:700,color:K.t2,marginBottom:8}}>No RTO data yet</p>
        <p style={{fontSize:13,color:K.t3,marginBottom:24,lineHeight:1.8}}>
          Upload a Unicommerce Sale Orders CSV.<br/>
          Only ER Shopify rows are used automatically.
        </p>
        <button onClick={()=>setShowUpload(true)} style={{cursor:"pointer",background:K.red,
          border:"none",borderRadius:8,padding:"10px 24px",color:"#fff",
          fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Sans',sans-serif"}}>
          ⬆ Upload First File
        </button>
      </div>}
      {cur&&activeTab==="month"&&<RTOMonthView data={cur}/>}
      {activeTab==="trend"&&<RTOTrendView months={months}/>}
    </div>

    <div style={{borderTop:`2px solid ${K.bdr}`,padding:"12px 32px",
      display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
      <span style={{fontSize:10,color:K.t3,fontFamily:"'IBM Plex Mono',monospace"}}>
        RTO = RTO_INITIATED + RTO_IN_TRANSIT + RTO_DELIVERED_TO_SELLER + RETURNED_TO_ORIGIN
      </span>
      <span style={{fontSize:10,color:K.t3,fontFamily:"'IBM Plex Mono',monospace"}}>
        Data saved in browser
      </span>
    </div>
  </div>;
}
